<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist — Korea &amp; Japan</title>
<link rel="icon" type="image/x-icon" href="b5e571d90f3a7d2157e5c8e42c7137b1.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#13110c; --ivory-rgb:19,17,12;
    --paper:#1c1a14; --paper-2:#221f18;
    --ink:#ece6d6; --ink-soft:#a8a08e; --ink-faint:#7a7363;
    --rule:#2e2a20; --rule-soft:#252118;
    --kr:#c06a3a; --jp:#4d82a6;
    --accent:var(--kr);
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 12px 32px -18px rgba(0,0,0,.7);
    --serif:'Newsreader', Georgia, serif;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:'Spline Sans Mono', ui-monospace, Menlo, monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--ivory);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}

  header.bar{
    position:sticky;top:0;z-index:1200;
    background:rgba(var(--ivory-rgb),.9);backdrop-filter:saturate(1.4) blur(12px);
    -webkit-backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--rule);
  }
  .bar-inner{max-width:880px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .wordmark{font-family:var(--serif);font-size:18px;white-space:nowrap}
  .wordmark .dot{color:var(--accent)}
  .bar-spacer{flex:1}
  .overall{font-family:var(--mono);font-size:12px;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:5px 11px;white-space:nowrap}
  .nav-link{font-family:var(--mono);font-size:12px;color:var(--ink-soft);text-decoration:none;border:1px solid var(--rule);border-radius:999px;padding:5px 11px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:color .15s,border-color .15s}
  .nav-link:hover{color:var(--ink);border-color:var(--accent)}
  .nav-link.danger:hover{border-color:var(--warn,#d99a5a);color:#e6b276}

  .wrap{max-width:880px;margin:0 auto;padding:30px 22px 80px}
  .intro{font-size:14px;color:var(--ink-soft);margin:0 0 26px}

  .cc{font-family:var(--serif);font-size:26px;margin:34px 0 14px;display:flex;align-items:center;gap:12px;letter-spacing:-.3px}
  .cc::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--accent)}
  .cc:first-of-type{margin-top:6px}

  .cd{background:var(--paper);border:1px solid var(--rule);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
  .cd-head{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-bottom:1px solid var(--rule-soft);background:linear-gradient(180deg,var(--paper-2),var(--paper))}
  .cd-num{font-family:var(--serif);font-size:12px;font-style:italic;color:#fff;background:var(--accent);min-width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .cd-meta{flex:1;min-width:0}
  .cd-date{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
  .cd-title{font-family:var(--serif);font-size:18px;line-height:1.2;margin-top:1px}
  .cd-region{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .cd-prog{font-family:var(--mono);font-size:11px;color:var(--ink-faint);border:1px solid var(--rule);border-radius:999px;padding:3px 9px;flex-shrink:0;white-space:nowrap}
  .cd-prog.full{color:var(--accent);border-color:var(--accent)}

  .ci-list{list-style:none;margin:0;padding:6px 8px 10px}
  .ci{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .12s}
  .ci:hover{background:var(--paper-2)}
  .cbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--rule);background:var(--paper-2);flex-shrink:0;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
  .ci:hover .cbox{border-color:var(--accent)}
  .cbox::after{content:"";width:11px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);opacity:0;transition:opacity .12s}
  .ci.done .cbox{background:var(--accent);border-color:var(--accent)}
  .ci.done .cbox::after{opacity:1}
  .ci-label{flex:1;min-width:0;font-size:14.5px}
  .ci-time{font-family:var(--mono);font-size:11px;color:var(--ink-faint);white-space:nowrap;flex-shrink:0}
  .ci.done .ci-label{text-decoration:line-through;text-decoration-color:var(--ink-faint);opacity:.5}
  .ci.done .ci-time{opacity:.5}

  @media (max-width:620px){
    .bar-inner{padding:10px 14px;gap:8px}
    .wordmark{font-size:15px}
    .wrap{padding:20px 14px 64px}
    .cc{font-size:22px;margin-top:26px}
    .ci-time{display:none}
  }
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<header class="bar">
  <div class="bar-inner">
    <div class="wordmark">Checklist<span class="dot">.</span></div>
    <div class="bar-spacer"></div>
    <span class="overall" id="overall">—</span>
    <button class="nav-link danger" id="clearAll" type="button" title="Uncheck everything">Reset</button>
    <a class="nav-link" href="itinerary.html" title="Back to the itinerary">← Itinerary</a>
  </div>
</header>

<main class="wrap">
  <p class="intro">Every line of the plan, grouped by day &amp; region. Tick things off as you go — checks sync with the itinerary page on this device.</p>
  <div id="list"></div>
</main>

<script src="trip-data.js"></script>
<script src="checklist-state.js"></script>
<script>
const fmtMonthDay=iso=>{const[y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});};

/* reduce a timeline line to just its place/label, no extra detail */
function cleanLabel(x){
  const tmp=document.createElement('div');
  tmp.innerHTML=x;
  const b=tmp.querySelector('b');
  let text=(b?b.textContent:tmp.textContent)||'';
  return text.replace(/\s+/g,' ').trim().replace(/[.\s]+$/,'').trim();
}

function dayCardHTML(d,di){
  const items=d.blocks.map((b,bi)=>{
    const id=Checklist.id(d.id,bi);
    return `<li class="ci" data-id="${id}">
      <button class="cbox" type="button" aria-pressed="false" aria-label="Mark done"></button>
      <span class="ci-label">${cleanLabel(b.x)}</span>
      <span class="ci-time">${b.t}</span>
    </li>`;
  }).join('');
  return `<section class="cd">
    <header class="cd-head">
      <span class="cd-num">${di+1}</span>
      <div class="cd-meta">
        <div class="cd-date">${d.dow} · ${fmtMonthDay(d.date)}</div>
        <div class="cd-title">${d.title}</div>
        <div class="cd-region">${d.area}</div>
      </div>
      <span class="cd-prog" data-day="${d.id}">0/0</span>
    </header>
    <ul class="ci-list">${items}</ul>
  </section>`;
}

function buildAll(){
  const host=document.getElementById('list');
  const countries=[['kr','South Korea'],['jp','Japan']];
  host.innerHTML=countries.map(([cKey,name])=>{
    const meta=TRIP[cKey];
    const days=meta.days.map((d,di)=>dayCardHTML(d,di)).join('');
    return `<div class="cgroup" style="--accent:${meta.accent}">
      <h2 class="cc">${name}</h2>${days}</div>`;
  }).join('');
}

function updateStates(){
  const done=Checklist.all();
  let total=0, doneCount=0; const perDay={};
  document.querySelectorAll('.ci[data-id]').forEach(li=>{
    const on=done.has(li.dataset.id);
    li.classList.toggle('done',on);
    li.querySelector('.cbox').setAttribute('aria-pressed',on?'true':'false');
    total++; if(on) doneCount++;
    const day=li.dataset.id.split('#')[0];
    (perDay[day]=perDay[day]||{t:0,d:0}).t++;
    if(on) perDay[day].d++;
  });
  document.querySelectorAll('.cd-prog').forEach(p=>{
    const s=perDay[p.dataset.day]||{t:0,d:0};
    p.textContent=`${s.d}/${s.t}`;
    p.classList.toggle('full', s.t>0 && s.d===s.t);
  });
  document.getElementById('overall').textContent=`${doneCount} / ${total} done`;
}

/* clicking anywhere on a row toggles it */
document.addEventListener('click',e=>{
  const li=e.target.closest('.ci[data-id]');
  if(li){ Checklist.toggle(li.dataset.id); return; }
  if(e.target.closest('#clearAll')){
    if(confirm('Uncheck every item?')) Checklist.clear();
  }
});

Checklist.onChange(updateStates);   // live sync from itinerary page / other tabs
buildAll();
updateStates();
</script>
</body>
</html>
